        <section class="content">
            <h1>HI,I am <br> 小興 HIN</h1>
            <p>我是一位虛擬實境開發者,同時也是網頁前端開發者.我在台灣育達科技大學多媒體與遊戲設計系畢業,並且目前就讀於育達
                科大資訊管理碩士班.
            </p>
            <br>
            <p>我的興趣是自主學習,把所有感興趣的技能都學習到入門階段,而後根據需求情況進修,最主要是讓自己具備各方面的可能性。
                人生宗旨是“沒有不會,只有還不會”.目前有接網絡前端和VR開發的中小型案子。有興趣的話可以點擊上方的作品集觀看,有興趣的話可以根據我的聯絡方式聯絡我。
            </p>
